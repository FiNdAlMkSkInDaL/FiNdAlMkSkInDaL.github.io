<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Portfolio: multi-colour pixel flowers on bush -->
  <rect width="16" height="16" fill="#166534"/>
  <!-- foliage -->
  <rect x="0" y="0" width="16" height="10" fill="#15803d"/>
  <rect x="1" y="2" width="3" height="3" fill="#22c55e"/>
  <rect x="6" y="1" width="4" height="3" fill="#4ade80"/>
  <rect x="11" y="3" width="4" height="3" fill="#16a34a"/>
  <rect x="2" y="7" width="5" height="3" fill="#14532d"/>
  <rect x="9" y="6" width="5" height="3" fill="#166534"/>
  <!-- pink flower -->
  <rect x="3" y="3" width="1" height="1" fill="#ff6b8a"/>
  <rect x="5" y="3" width="1" height="1" fill="#ff6b8a"/>
  <rect x="4" y="2" width="1" height="1" fill="#ff8fab"/>
  <rect x="4" y="4" width="1" height="1" fill="#ff8fab"/>
  <rect x="4" y="3" width="1" height="1" fill="#ffe566"/>
  <!-- cyan flower -->
  <rect x="10" y="4" width="1" height="1" fill="#22d3ee"/>
  <rect x="12" y="4" width="1" height="1" fill="#22d3ee"/>
  <rect x="11" y="3" width="1" height="1" fill="#67e8f9"/>
  <rect x="11" y="5" width="1" height="1" fill="#67e8f9"/>
  <rect x="11" y="4" width="1" height="1" fill="#fde047"/>
  <!-- gold flower -->
  <rect x="7" y="7" width="1" height="1" fill="#fbbf24"/>
  <rect x="9" y="7" width="1" height="1" fill="#fbbf24"/>
  <rect x="8" y="6" width="1" height="1" fill="#fde68a"/>
  <rect x="8" y="8" width="1" height="1" fill="#fde68a"/>
  <rect x="8" y="7" width="1" height="1" fill="#f97316"/>
  <!-- purple flower -->
  <rect x="12" y="9" width="1" height="1" fill="#c026d3"/>
  <rect x="14" y="9" width="1" height="1" fill="#e879f9"/>
  <rect x="13" y="8" width="1" height="1" fill="#a78bfa"/>
  <rect x="13" y="10" width="1" height="1" fill="#a78bfa"/>
  <rect x="13" y="9" width="1" height="1" fill="#22d3ee"/>
  <!-- ground strip -->
  <rect x="0" y="12" width="16" height="4" fill="#14532d"/>
  <rect x="0" y="13" width="16" height="3" fill="#3f2a1e"/>
</svg>
