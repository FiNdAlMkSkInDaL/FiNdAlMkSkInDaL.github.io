<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Pixel meadow portfolio — click the big flowers to open projects."
    />
    <title>Finlay · Pixel Meadow</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="world" id="world">
      <!-- Sky + sun -->
      <div class="sky">
        <div class="sun" aria-hidden="true">
          <span class="sun-core"></span>
          <span class="ray r1"></span>
          <span class="ray r2"></span>
          <span class="ray r3"></span>
          <span class="ray r4"></span>
        </div>
        <div class="cloud c1" aria-hidden="true"></div>
        <div class="cloud c2" aria-hidden="true"></div>
        <div class="cloud c3" aria-hidden="true"></div>
      </div>

      <!-- Dense meadow: grass tiles + layered flowers (smaller = farther) -->
      <div class="field" id="field" aria-hidden="true"></div>
      <div class="wild-layer far-blooms" id="farBlooms" aria-hidden="true"></div>
      <div class="wild-layer mid-blooms" id="midBlooms" aria-hidden="true"></div>
      <div class="wild-layer near-blooms" id="nearBlooms" aria-hidden="true"></div>

      <!-- Frolicking dog -->
      <div class="dog" id="dog" aria-hidden="true" title="good dog">
        <div class="dog-sprite"></div>
      </div>

      <!-- Identity HUD -->
      <header class="hud">
        <img class="avatar" src="./assets/photo.jpg" alt="Finlay" width="40" height="40" />
        <div class="hud-text">
          <p class="name">FINLAY</p>
          <p class="tip">HOVER FLOWERS · CLICK TO PLAY</p>
        </div>
      </header>

      <!-- Project flowers (interactive) -->
      <nav class="boss-flowers" aria-label="Projects">
        <a
          class="boss theme-tickforge"
          href="https://findalmkskindal.github.io/tickforge/explorer/"
          target="_blank"
          rel="noopener noreferrer"
          data-name="TICKFORGE"
        >
          <span class="name-tag">TICKFORGE</span>
          <span class="boss-bloom" aria-hidden="true"></span>
          <span class="boss-stem" aria-hidden="true"></span>
        </a>

        <a
          class="boss theme-vectorbot"
          href="./demos/vectorbot.html"
          target="_blank"
          rel="noopener noreferrer"
          data-name="VECTORBOT"
        >
          <span class="name-tag">VECTORBOT</span>
          <span class="boss-bloom" aria-hidden="true"></span>
          <span class="boss-stem" aria-hidden="true"></span>
        </a>

        <a
          class="boss theme-macro"
          href="https://github.com/FiNdAlMkSkInDaL"
          target="_blank"
          rel="noopener noreferrer"
          data-name="MACRO BIAS"
        >
          <span class="name-tag">MACRO BIAS</span>
          <span class="boss-bloom" aria-hidden="true"></span>
          <span class="boss-stem" aria-hidden="true"></span>
        </a>
      </nav>

      <footer class="hud-foot">
        <a href="https://github.com/FiNdAlMkSkInDaL" target="_blank" rel="noopener noreferrer"
          >GITHUB</a
        >
      </footer>
    </div>

    <script>
      (function () {
        const field = document.getElementById("field");
        const W = 56;
        const H = 26;
        const grass = ["#5cb85c", "#4caf50", "#66bb6a", "#43a047", "#7cb342", "#8bc34a", "#9ccc65"];
        const petals = [
          "#ff8a80", "#ff80ab", "#ea80fc", "#b388ff", "#82b1ff",
          "#ffd180", "#ffff8d", "#ccff90", "#ffab91", "#f8bbd0",
          "#80d8ff", "#a7ffeb", "#ffccbc", "#e1bee7", "#c5e1a5",
        ];

        // Grass base (every tile) + many on-tile flowers
        const frag = document.createDocumentFragment();
        for (let y = 0; y < H; y++) {
          // y=0 is far (horizon), y=H-1 is near
          const depth = y / (H - 1); // 0 far → 1 near
          const flowerChance = 0.22 + depth * 0.55; // denser nearby
          const scale = 0.35 + depth * 0.95; // smaller when farther
          for (let x = 0; x < W; x++) {
            const cell = document.createElement("div");
            cell.className = "tile grass";
            cell.style.setProperty("--gc", grass[(x * 3 + y * 5) % grass.length]);
            if (Math.random() < 0.5) cell.classList.add("tall");
            if (Math.random() < flowerChance) {
              cell.classList.add("flower");
              cell.style.setProperty("--fc", petals[(x * 7 + y * 11) % petals.length]);
              cell.style.setProperty("--fs", scale.toFixed(3));
            }
            cell.style.animationDelay = ((x + y) % 10) * 0.1 + "s";
            frag.appendChild(cell);
          }
        }
        field.style.setProperty("--cols", W);
        field.style.setProperty("--rows", H);
        field.appendChild(frag);

        // Extra free-floating bloom layers (more flowers, size by depth band)
        function sprinkle(layerId, count, sizeMin, sizeMax, topMin, topMax, blur) {
          const layer = document.getElementById(layerId);
          const f = document.createDocumentFragment();
          for (let i = 0; i < count; i++) {
            const el = document.createElement("span");
            el.className = "scatter-bloom";
            const size = sizeMin + Math.random() * (sizeMax - sizeMin);
            el.style.width = size + "px";
            el.style.height = size + "px";
            el.style.left = Math.random() * 100 + "%";
            el.style.top = topMin + Math.random() * (topMax - topMin) + "%";
            el.style.setProperty("--fc", petals[i % petals.length]);
            el.style.setProperty("--blur", blur + "px");
            el.style.animationDelay = (Math.random() * 2).toFixed(2) + "s";
            el.style.opacity = (0.55 + Math.random() * 0.4).toFixed(2);
            f.appendChild(el);
          }
          layer.appendChild(f);
        }
        // Far = tiny, mid = medium, near = larger (still smaller than boss flowers)
        sprinkle("farBlooms", 90, 4, 8, 0, 100, 1.2);
        sprinkle("midBlooms", 110, 7, 14, 0, 100, 0.6);
        sprinkle("nearBlooms", 80, 11, 20, 0, 100, 0);

        // Dog frolic
        const dog = document.getElementById("dog");
        let t = 0;
        function hop() {
          t += 0.016;
          const x = 8 + ((t * 12) % 84);
          const bounce = Math.abs(Math.sin(t * 6)) * 10;
          const dir = Math.floor((t * 12) / 84) % 2 === 0 ? 1 : -1;
          const px = dir === 1 ? x : 92 - x;
          dog.style.left = px + "%";
          dog.style.bottom = 28 + bounce * 0.15 + "%";
          dog.style.transform = "scaleX(" + (dir === 1 ? 1 : -1) + ")";
          requestAnimationFrame(hop);
        }
        requestAnimationFrame(hop);
      })();
    </script>
  </body>
</html>
