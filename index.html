<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A spring meadow portfolio — hover the flowers to explore projects."
    />
    <title>Finlay · Meadow</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Outfit:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="sky" aria-hidden="true"></div>
    <div class="haze" aria-hidden="true"></div>

    <!-- Distant meadow (background layer) -->
    <div class="meadow far" aria-hidden="true">
      <div class="grass-strip g1"></div>
      <div class="grass-strip g2"></div>
      <div class="grass-strip g3"></div>
      <!-- Soft background blooms (non-interactive) -->
      <span class="wild w1"></span>
      <span class="wild w2"></span>
      <span class="wild w3"></span>
      <span class="wild w4"></span>
      <span class="wild w5"></span>
      <span class="wild w6"></span>
      <span class="wild w7"></span>
      <span class="wild w8"></span>
      <span class="wild w9"></span>
      <span class="wild w10"></span>
      <span class="wild w11"></span>
      <span class="wild w12"></span>
    </div>

    <!-- Mid grass -->
    <div class="meadow mid" aria-hidden="true">
      <div class="blade-layer b-a"></div>
      <div class="blade-layer b-b"></div>
      <span class="wild m1"></span>
      <span class="wild m2"></span>
      <span class="wild m3"></span>
      <span class="wild m4"></span>
      <span class="wild m5"></span>
      <span class="wild m6"></span>
      <span class="wild m7"></span>
      <span class="wild m8"></span>
    </div>

    <header class="identity">
      <img class="avatar" src="./assets/photo.jpg" alt="Finlay" width="72" height="72" />
      <div>
        <p class="hello">Finlay</p>
        <p class="hint">Hover a flower · click to open a project</p>
      </div>
    </header>

    <!-- Interactive project flowers (foreground) -->
    <nav class="projects-field" aria-label="Projects">
      <a
        class="flower-link f-tickforge"
        href="https://findalmkskindal.github.io/tickforge/explorer/"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="label">TickForge</span>
        <span class="stem" aria-hidden="true"></span>
        <span class="bloom" aria-hidden="true">
          <span class="petal p1"></span>
          <span class="petal p2"></span>
          <span class="petal p3"></span>
          <span class="petal p4"></span>
          <span class="petal p5"></span>
          <span class="petal p6"></span>
          <span class="center"></span>
        </span>
        <span class="leaf l1" aria-hidden="true"></span>
        <span class="leaf l2" aria-hidden="true"></span>
      </a>

      <a
        class="flower-link f-vectorbot"
        href="./demos/vectorbot.html"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="label">VectorBot</span>
        <span class="stem" aria-hidden="true"></span>
        <span class="bloom" aria-hidden="true">
          <span class="petal p1"></span>
          <span class="petal p2"></span>
          <span class="petal p3"></span>
          <span class="petal p4"></span>
          <span class="petal p5"></span>
          <span class="petal p6"></span>
          <span class="center"></span>
        </span>
        <span class="leaf l1" aria-hidden="true"></span>
        <span class="leaf l2" aria-hidden="true"></span>
      </a>

      <a
        class="flower-link f-macro"
        href="https://github.com/FiNdAlMkSkInDaL"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="label">Macro Bias</span>
        <span class="stem" aria-hidden="true"></span>
        <span class="bloom" aria-hidden="true">
          <span class="petal p1"></span>
          <span class="petal p2"></span>
          <span class="petal p3"></span>
          <span class="petal p4"></span>
          <span class="petal p5"></span>
          <span class="petal p6"></span>
          <span class="center"></span>
        </span>
        <span class="leaf l1" aria-hidden="true"></span>
        <span class="leaf l2" aria-hidden="true"></span>
      </a>
    </nav>

    <!-- Foreground grass tufts (in front of stems slightly) -->
    <div class="meadow front" aria-hidden="true">
      <div class="blade-layer b-c"></div>
      <div class="tuft t1"></div>
      <div class="tuft t2"></div>
      <div class="tuft t3"></div>
      <div class="tuft t4"></div>
      <div class="tuft t5"></div>
    </div>

    <footer class="foot">
      <a href="https://github.com/FiNdAlMkSkInDaL" target="_blank" rel="noopener noreferrer"
        >GitHub</a
      >
    </footer>
  </body>
</html>
