<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Pixel bush portfolio — hover and click the flowers."
    />
    <title>Finlay · Pixel Bush</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="world">
      <!-- Soft sky peeking through canopy gaps -->
      <div class="sky-peek" aria-hidden="true"></div>

      <!-- Full-frame pixel bush (leaves + dense same-colour blossoms) -->
      <canvas id="bush" class="bush-canvas" aria-hidden="true"></canvas>

      <!-- Identity HUD -->
      <header class="hud">
        <img
          class="avatar"
          src="./assets/photo.jpg"
          alt="Finlay"
          width="40"
          height="40"
        />
        <div class="hud-text">
          <p class="name">FINLAY</p>
          <p class="tip">HOVER A FLOWER · CLICK TO OPEN</p>
        </div>
      </header>

      <!-- A few larger blooms on the same bush = projects (same pink family) -->
      <nav class="boss-flowers" aria-label="Projects">
        <a
          class="boss"
          href="https://findalmkskindal.github.io/tickforge/explorer/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="name-tag">TICKFORGE</span>
          <span class="boss-bloom" aria-hidden="true"></span>
          <span class="boss-stem" aria-hidden="true"></span>
        </a>

        <a
          class="boss boss-mid"
          href="./demos/vectorbot.html"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="name-tag">VECTORBOT</span>
          <span class="boss-bloom" aria-hidden="true"></span>
          <span class="boss-stem" aria-hidden="true"></span>
        </a>

        <a
          class="boss boss-right"
          href="https://github.com/FiNdAlMkSkInDaL"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="name-tag">MACRO BIAS</span>
          <span class="boss-bloom" aria-hidden="true"></span>
          <span class="boss-stem" aria-hidden="true"></span>
        </a>
      </nav>

      <footer class="hud-foot">
        <a
          href="https://github.com/FiNdAlMkSkInDaL"
          target="_blank"
          rel="noopener noreferrer"
          >GITHUB</a
        >
      </footer>
    </div>

    <script>
      (function () {
        const canvas = document.getElementById("bush");
        const ctx = canvas.getContext("2d");

        // Same-colour blossom palette (pink family, slight shade variance)
        const PINK = [
          "#ff8fab",
          "#ff6b8a",
          "#ffb3c6",
          "#ff99b0",
          "#f472b6",
          "#fda4af",
          "#fb7185",
        ];
        const LEAF = [
          "#1b4332",
          "#2d6a4f",
          "#40916c",
          "#52b788",
          "#166534",
          "#14532d",
          "#15803d",
        ];
        const BARK = ["#3f2a1e", "#5c3d2e", "#4a3224", "#6b4423"];

        function resize() {
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          // Low-res pixel buffer scaled up
          const w = Math.ceil(window.innerWidth / 4);
          const h = Math.ceil(window.innerHeight / 4);
          canvas.width = w;
          canvas.height = h;
          canvas.style.width = window.innerWidth + "px";
          canvas.style.height = window.innerHeight + "px";
          paint(w, h);
        }

        function paint(w, h) {
          // Deep foliage fill
          ctx.fillStyle = "#14532d";
          ctx.fillRect(0, 0, w, h);

          // Branch structure (thick pixel trunks across frame)
          for (let i = 0; i < 18; i++) {
            const x0 = Math.floor((i / 18) * w + (Math.sin(i * 2.1) * w) / 20);
            let x = x0;
            let y = h;
            ctx.fillStyle = BARK[i % BARK.length];
            const steps = Math.floor(h * (0.55 + (i % 5) * 0.08));
            for (let s = 0; s < steps; s++) {
              const thick = 2 + ((i + s) % 3);
              ctx.fillRect(x, y - s, thick, 2);
              if (s % 7 === 0) x += (i % 2 === 0 ? 1 : -1) * ((s % 3) + 1);
              // side twigs
              if (s % 11 === 0) {
                const dir = s % 22 === 0 ? 1 : -1;
                for (let t = 0; t < 8; t++) {
                  ctx.fillRect(x + dir * t, y - s - Math.floor(t / 2), 2, 2);
                }
              }
            }
          }

          // Leaf clusters — dense, whole frame
          const leafCount = Math.floor((w * h) / 9);
          for (let i = 0; i < leafCount; i++) {
            const x = (i * 17 + (i * i) % 13) % w;
            const y = (i * 31 + i * 3) % h;
            // Prefer upper/mid canopy density but cover all
            if (Math.random() > 0.92 && y > h * 0.85) continue;
            ctx.fillStyle = LEAF[(x + y + i) % LEAF.length];
            const s = 2 + ((x + y) % 3);
            ctx.fillRect(x, y, s, s);
            if ((i + y) % 4 === 0) ctx.fillRect(x + 1, y - 1, s, s);
          }

          // Blossoms — same colour family, denser toward center of bush
          const bloomCount = Math.floor((w * h) / 14);
          for (let i = 0; i < bloomCount; i++) {
            // Cluster toward middle of frame (side-of-bush zoom)
            const cx = w * 0.5 + (Math.random() - 0.5) * w * 0.95;
            const cy = h * 0.48 + (Math.random() - 0.5) * h * 0.9;
            const x = Math.floor(Math.max(1, Math.min(w - 4, cx)));
            const y = Math.floor(Math.max(1, Math.min(h - 4, cy)));
            // Depth: slightly smaller near edges / top (further into canopy)
            const dist =
              Math.hypot(x - w * 0.5, y - h * 0.55) /
              (Math.hypot(w, h) * 0.5);
            const depth = Math.min(1, dist);
            const scale = depth > 0.75 ? 1 : depth > 0.45 ? 2 : 2 + (Math.random() > 0.6 ? 1 : 0);
            // invert: closer to viewer (bottom-center) a bit larger
            const near = y / h;
            const r = near > 0.55 ? 2 + (scale > 1 ? 1 : 0) : near > 0.3 ? 2 : 1;

            const pink = PINK[(i + x) % PINK.length];
            drawPixelFlower(ctx, x, y, r, pink);
          }

          // Extra dense patch of same-colour blooms (bush volume)
          for (let i = 0; i < Math.floor(w * 2.2); i++) {
            const x = Math.floor(Math.random() * w);
            const y = Math.floor(h * 0.15 + Math.random() * h * 0.7);
            drawPixelFlower(ctx, x, y, 1 + (Math.random() > 0.7 ? 1 : 0), PINK[i % PINK.length]);
          }
        }

        function drawPixelFlower(ctx, x, y, r, pink) {
          // cross petals + yellow center
          ctx.fillStyle = pink;
          ctx.fillRect(x - r, y, r * 2 + 1, 1);
          ctx.fillRect(x, y - r, 1, r * 2 + 1);
          if (r >= 2) {
            ctx.fillRect(x - r + 1, y - r + 1, 1, 1);
            ctx.fillRect(x + r - 1, y - r + 1, 1, 1);
            ctx.fillRect(x - r + 1, y + r - 1, 1, 1);
            ctx.fillRect(x + r - 1, y + r - 1, 1, 1);
          }
          ctx.fillStyle = "#ffe566";
          ctx.fillRect(x, y, 1, 1);
        }

        resize();
        window.addEventListener("resize", resize);
      })();
    </script>
  </body>
</html>
