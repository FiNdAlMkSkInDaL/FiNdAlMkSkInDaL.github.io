<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Pixel bush portfolio — hover and click the flowers."
    />
    <title>Finlay · Pixel Bush</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="world">
      <div class="sky-peek" aria-hidden="true"></div>
      <canvas id="bush" class="bush-canvas" aria-hidden="true"></canvas>

      <!-- Pixel snake (top-right) -->
      <div class="snake" aria-hidden="true" title="sss">
        <div class="snake-body"></div>
        <div class="snake-head">
          <span class="eye e1"></span>
          <span class="eye e2"></span>
          <span class="tongue"></span>
        </div>
      </div>

      <header class="hud">
        <img
          class="avatar"
          src="./assets/photo.jpg"
          alt="Finlay"
          width="40"
          height="40"
        />
        <div class="hud-text">
          <p class="name">FINLAY</p>
          <p class="tip">HOVER A FLOWER · CLICK TO OPEN</p>
        </div>
      </header>

      <nav class="boss-flowers" aria-label="Projects">
        <!-- left ~60% up screen -->
        <a
          class="boss b-left"
          href="https://findalmkskindal.github.io/tickforge/explorer/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="name-tag">TICKFORGE</span>
          <span class="boss-bloom" aria-hidden="true"></span>
          <svg class="wiggle-stem" viewBox="0 0 40 120" aria-hidden="true">
            <path
              d="M20 8 C 8 28, 32 42, 14 58 C 2 72, 30 88, 18 118"
              fill="none"
              stroke="#166534"
              stroke-width="5"
              stroke-linecap="square"
            />
            <path
              d="M20 8 C 8 28, 32 42, 14 58 C 2 72, 30 88, 18 118"
              fill="none"
              stroke="#4ade80"
              stroke-width="2"
              stroke-linecap="square"
              opacity="0.5"
            />
          </svg>
        </a>

        <!-- middle ~30% up -->
        <a
          class="boss b-mid"
          href="./demos/vectorbot.html"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="name-tag">VECTORBOT</span>
          <span class="boss-bloom" aria-hidden="true"></span>
          <svg class="wiggle-stem" viewBox="0 0 48 100" aria-hidden="true">
            <path
              d="M28 10 C 40 30, 10 40, 36 55 C 48 68, 12 80, 24 100"
              fill="none"
              stroke="#166534"
              stroke-width="5"
              stroke-linecap="square"
            />
            <path
              d="M28 10 C 40 30, 10 40, 36 55 C 48 68, 12 80, 24 100"
              fill="none"
              stroke="#4ade80"
              stroke-width="2"
              stroke-linecap="square"
              opacity="0.5"
            />
          </svg>
        </a>

        <!-- right ~80% up -->
        <a
          class="boss b-right"
          href="https://github.com/FiNdAlMkSkInDaL"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="name-tag">MACRO BIAS</span>
          <span class="boss-bloom" aria-hidden="true"></span>
          <svg class="wiggle-stem" viewBox="0 0 44 130" aria-hidden="true">
            <path
              d="M22 6 C 4 22, 38 36, 10 52 C 36 70, 6 90, 26 128"
              fill="none"
              stroke="#166534"
              stroke-width="5"
              stroke-linecap="square"
            />
            <path
              d="M22 6 C 4 22, 38 36, 10 52 C 36 70, 6 90, 26 128"
              fill="none"
              stroke="#4ade80"
              stroke-width="2"
              stroke-linecap="square"
              opacity="0.5"
            />
          </svg>
        </a>
      </nav>

      <footer class="hud-foot">
        <a
          href="https://github.com/FiNdAlMkSkInDaL"
          target="_blank"
          rel="noopener noreferrer"
          >GITHUB</a
        >
      </footer>
    </div>

    <script>
      (function () {
        const canvas = document.getElementById("bush");
        const ctx = canvas.getContext("2d");

        // Lighter greens toward top of screen
        const LEAF_LIGHT = ["#86efac", "#4ade80", "#6ee7b7", "#a3e635", "#84cc16", "#bbf7d0"];
        const LEAF_MID = ["#22c55e", "#16a34a", "#4ade80", "#65a30d", "#15803d"];
        const LEAF_DARK = ["#166534", "#14532d", "#15803d", "#3f6212", "#1a2e05"];
        const BARK = ["#3f2a1e", "#5c3d2e", "#4a3224", "#6b4423"];

        function leafColor(yNorm) {
          // yNorm 0 = top, 1 = bottom
          const r = Math.random();
          if (yNorm < 0.35) {
            return LEAF_LIGHT[Math.floor(r * LEAF_LIGHT.length)];
          }
          if (yNorm < 0.65) {
            return r < 0.55
              ? LEAF_MID[Math.floor(r * LEAF_MID.length)]
              : LEAF_LIGHT[Math.floor(r * LEAF_LIGHT.length)];
          }
          return r < 0.65
            ? LEAF_DARK[Math.floor(r * LEAF_DARK.length)]
            : LEAF_MID[Math.floor(r * LEAF_MID.length)];
        }

        function resize() {
          const w = Math.ceil(window.innerWidth / 4);
          const h = Math.ceil(window.innerHeight / 4);
          canvas.width = w;
          canvas.height = h;
          canvas.style.width = window.innerWidth + "px";
          canvas.style.height = window.innerHeight + "px";
          paint(w, h);
        }

        function paint(w, h) {
          // Base gradient: light top → deep bottom
          for (let y = 0; y < h; y++) {
            const t = y / h;
            const g = Math.floor(180 - t * 100);
            const r = Math.floor(40 + (1 - t) * 50);
            const b = Math.floor(50 + (1 - t) * 40);
            ctx.fillStyle = "rgb(" + r + "," + g + "," + b + ")";
            ctx.fillRect(0, y, w, 1);
          }

          // Branches
          for (let i = 0; i < 22; i++) {
            let x = Math.floor((i / 22) * w + Math.sin(i * 1.7) * 6);
            let y = h;
            ctx.fillStyle = BARK[i % BARK.length];
            const steps = Math.floor(h * (0.5 + (i % 6) * 0.08));
            for (let s = 0; s < steps; s++) {
              const thick = 2 + ((i + s) % 3);
              ctx.fillRect(x, y - s, thick, 2);
              if (s % 6 === 0) x += ((i + s) % 2 === 0 ? 1 : -1) * (1 + (s % 2));
              if (s % 9 === 0) {
                const dir = s % 18 === 0 ? 1 : -1;
                for (let t = 0; t < 10; t++) {
                  ctx.fillRect(x + dir * t, y - s - Math.floor(t / 2), 2, 2);
                }
              }
            }
          }

          // Dense leaves — NO pink flowers
          const leafCount = Math.floor((w * h) / 5.5);
          for (let i = 0; i < leafCount; i++) {
            const x = (i * 19 + (i * i) % 17) % w;
            const y = (i * 29 + i * 5) % h;
            const yNorm = y / h;
            ctx.fillStyle = leafColor(yNorm);
            const s = yNorm < 0.3 ? 2 + ((x + y) % 2) : 2 + ((x + y) % 3);
            ctx.fillRect(x, y, s, s);
            if ((i + y) % 3 === 0) ctx.fillRect(x - 1, y + 1, s, s);
          }

          // Lighter highlight speckles near top (sun through canopy)
          ctx.globalAlpha = 0.35;
          for (let i = 0; i < Math.floor(w * 1.5); i++) {
            const x = Math.floor(Math.random() * w);
            const y = Math.floor(Math.random() * h * 0.4);
            ctx.fillStyle = "#bbf7d0";
            ctx.fillRect(x, y, 2, 2);
          }
          ctx.globalAlpha = 1;
        }

        resize();
        window.addEventListener("resize", resize);
      })();
    </script>
  </body>
</html>
